<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جمعية البركة الخيرية</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Tajawal', system-ui, sans-serif;
  background: linear-gradient(135deg, #0f766e 0%, #14b8a6 50%, #99f6e4 100%);
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* البطاقة */
.container {
  width: 92%;
  max-width: 380px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 40px 22px;
  background: rgba(255,255,255,0.12);
  border-radius: 28px;
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 25px 70px rgba(0,0,0,0.18);
  text-align: center;
}

/* الشعار الجديد (مستطيل) بدون قص */
.logo {
  width: 170px;          /* عدّلها إذا تبي أكبر/أصغر */
  margin: 0 auto 18px;
  background: transparent;
  border: none;
  box-shadow: none;
  padding: 0;
}

.logo img {
  width: 100%;
  height: auto;
  display: block;
}

h1 {
  font-size: 24px;
  color: #ffffff;
  font-weight: 700;
  margin: 0 0 6px 0;
}

.subtitle {
  font-size: 14px;
  color: rgba(255,255,255,0.85);
  margin-bottom: 30px;
}

/* الروابط */
.links-container {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.link {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px;
  border-radius: 18px;
  font-size: 15px;
  font-weight: 500;
  text-decoration: none;
  color: #ffffff;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.25);
  transition: all 0.25s ease;
}

.link:hover {
  background: rgba(255,255,255,0.28);
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.icon-box {
  width: 42px;
  height: 42px;
  background: rgba(255,255,255,0.25);
  border-radius: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 20px;
}

.text {
  flex: 1;
  text-align: right;
}

/* Responsive */
@media (max-width: 480px) {
  .container {
    border-radius: 22px;
    padding: 35px 18px;
  }

  .logo {
    width: 145px;     /* تصغير للشاشات الصغيرة */
    margin-bottom: 16px;
  }

  h1 { font-size: 20px; }

  .link {
    font-size: 14px;
    padding: 15px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="https://i.ibb.co/CKqrJ7Qr/cover.png" alt="جمعية البركة الخيرية">
  </div>

  <h1>جمعية البركة الخيرية</h1>
  <p class="subtitle">نسعد بخدمتكم</p>

  <div class="links-container">

    <a href="https://www.albarkah.org/profile-request/" target="_blank" class="link" rel="noopener">
      <div class="icon-box">📝</div>
      <div class="text">طلب تسجيل مستفيد جديد</div>
    </a>

    <a href="https://drive.google.com/file/d/1-Ziyteb_n3ZjyRUOkC5SLXHTKVDJjzBM/view?usp=sharing" target="_blank" class="link" rel="noopener">
      <div class="icon-box">📂</div>
      <div class="text">الوثائق المطلوبة</div>
    </a>

    <a href="https://drive.google.com/file/d/1CgMJ3AX6PQDpAaiRRuirkCuKBSAeJ9t-/view" target="_blank" class="link" rel="noopener">
      <div class="icon-box">📄</div>
      <div class="text">طريقة استخراج الوثائق</div>
    </a>

  </div>

</div>

</body>
</html>
